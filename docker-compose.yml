version: "3.9"

services:

  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: krishiniti-postgres
    environment:
      POSTGRES_DB: krishiniti
      POSTGRES_USER: krishiniti_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql
      - ./db/migrations:/docker-entrypoint-initdb.d/migrations
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U krishiniti_app -d krishiniti"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - krishiniti-net

  redis:
    image: redis:7.2-alpine
    container_name: krishiniti-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - krishiniti-net

  price-ingestion-service:
    build:
      context: ./services/price-ingestion-service
      dockerfile: Dockerfile
    container_name: krishiniti-price-ingestion
    env_file: .env
    environment:
      DATABASE_URL: postgresql://krishiniti_app:${POSTGRES_PASSWORD}@postgres:5432/krishiniti
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    ports:
      - "8001:8000"
    networks:
      - krishiniti-net
    restart: unless-stopped

  weather-service:
    build:
      context: ./services/weather-service
      dockerfile: Dockerfile
    container_name: krishiniti-weather
    env_file: .env
    environment:
      DATABASE_URL: postgresql://krishiniti_app:${POSTGRES_PASSWORD}@postgres:5432/krishiniti
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    ports:
      - "8002:8000"
    networks:
      - krishiniti-net
    restart: unless-stopped

  forecast-service:
    build:
      context: ./services/forecast-service
      dockerfile: Dockerfile
    container_name: krishiniti-forecast
    env_file: .env
    environment:
      DATABASE_URL: postgresql://krishiniti_app:${POSTGRES_PASSWORD}@postgres:5432/krishiniti
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/2
      MODEL_ARTIFACTS_PATH: /app/model_artifacts
      FORECAST_DISTRICT: ${FORECAST_DISTRICT:-Ludhiana}
      FORECAST_STATE: ${FORECAST_STATE:-Punjab}
    depends_on:
      postgres:
        condition: service_healthy
      price-ingestion-service:
        condition: service_started
      weather-service:
        condition: service_started
    volumes:
      - model_artifacts:/app/model_artifacts
    ports:
      - "8003:8000"
    networks:
      - krishiniti-net
    restart: unless-stopped

  alert-service:
    build:
      context: ./services/alert-service
      dockerfile: Dockerfile
    container_name: krishiniti-alert
    env_file: .env
    environment:
      DATABASE_URL: postgresql://krishiniti_app:${POSTGRES_PASSWORD}@postgres:5432/krishiniti
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/3
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8004:8000"
    networks:
      - krishiniti-net
    restart: unless-stopped

  farmer-service:
    build:
      context: ./services/farmer-service
      dockerfile: Dockerfile
    container_name: krishiniti-farmer
    env_file: .env
    environment:
      DATABASE_URL: postgresql://krishiniti_app:${POSTGRES_PASSWORD}@postgres:5432/krishiniti
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/4
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8005:8000"
    networks:
      - krishiniti-net
    restart: unless-stopped

  analytics-service:
    build:
      context: ./services/analytics-service
      dockerfile: Dockerfile
    container_name: krishiniti-analytics
    env_file: .env
    environment:
      DATABASE_URL: postgresql://krishiniti_app:${POSTGRES_PASSWORD}@postgres:5432/krishiniti
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8006:8000"
    networks:
      - krishiniti-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: krishiniti-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8003
      DATABASE_URL: postgresql://krishiniti_app:${POSTGRES_PASSWORD}@postgres:5432/krishiniti
    ports:
      - "3000:3000"
    depends_on:
      - forecast-service
      - farmer-service
    networks:
      - krishiniti-net

volumes:
  postgres_data:
  redis_data:
  model_artifacts:

networks:
  krishiniti-net:
    driver: bridge
