# Local development overrides — hot reload for all services
version: "3.9"
services:
  price-ingestion-service:
    volumes:
      - ./services/price-ingestion-service:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  weather-service:
    volumes:
      - ./services/weather-service:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  forecast-service:
    volumes:
      - ./services/forecast-service:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  alert-service:
    volumes:
      - ./services/alert-service:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  farmer-service:
    volumes:
      - ./services/farmer-service:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  analytics-service:
    volumes:
      - ./services/analytics-service:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    command: sh -c "npm install --include=dev && npm run dev"
    user: root
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      DATABASE_URL: postgresql://krishiniti_app:${POSTGRES_PASSWORD}@postgres:5432/krishiniti
      NODE_ENV: development

volumes:
  frontend_node_modules:
