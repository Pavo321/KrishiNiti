name: CI — forecast-service

on:
  push:
    paths:
      - "services/forecast-service/**"
      - ".github/workflows/ci-forecast.yml"
  pull_request:
    paths:
      - "services/forecast-service/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/forecast-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/forecast-service/requirements.txt

      - run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check app/ tests/

      - name: Type check (mypy)
        run: mypy app/ --ignore-missing-imports

      - name: Unit tests
        run: pytest tests/ -v --cov=app --cov-report=term-missing --cov-fail-under=80

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t krishiniti/forecast:${{ github.sha }} services/forecast-service/

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: krishiniti/forecast:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: 1
